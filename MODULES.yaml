schema: travel.module_inventory.v1
status: PUBLIC_SAFE_ARCHITECTURE_BASELINE
project_id: travel
source_refs:
  - alanua/Skeleton#1750
  - alanua/Skeleton#1748
  - alanua/Skeleton#1747
  - alanua/Skeleton#1749
  - alanua/Skeleton#1545
  - alanua/Skeleton#1761
  - alanua/Travel#1

modes:
  ANNUAL_MAP_MODE:
    purpose: worldwide discovery and rolling opportunity-window maintenance
    side_effect_class: proposal
    includes:
      - worldwide_discovery
      - rolling_opportunity_map
      - weekend_radar
  BOOKING_MODE:
    purpose: live verification, shortlist comparison, itinerary composition and booking-ready journey preparation after explicit operator selection
    side_effect_class: proposal
    entry_gate: explicit_operator_selection
    stages:
      - live_shortlist
      - selected_variant
      - itinerary_composed
      - booking_ready
    forbidden_without_separate_approval:
      - booking
      - reservation
      - payment
      - contact
      - cancellation
      - subscription_change

travel_owned_modules:
  - module_id: travel.trip_model
    class: domain_component
    status: planned
    purpose: trip, traveller-reference, itinerary, segment and trip-pack semantics
  - module_id: travel.lifecycle
    class: domain_component
    status: planned
    purpose: option, watch, shortlist, plan, booking-record and completion state transitions
  - module_id: travel.opportunity_map
    class: domain_component
    status: planned
    purpose: rolling twelve-month opportunity map with window, urgency, confidence and next-review semantics
  - module_id: travel.global_discovery
    class: domain_component
    status: planned
    purpose: worldwide discovery of destinations, routes, packages, events, natural phenomena and transport corridors
  - module_id: travel.opportunity_model
    class: domain_component
    status: planned
    purpose: provider-neutral opportunity scoring using evidence, seasonality, lead time, demand, reliability, risk, documents, route quality and private-profile inputs
  - module_id: travel.weekend_radar
    class: domain_component
    status: planned
    purpose: day-trip and two-to-four-day opportunity evaluation with useful-time and leave-use policy
  - module_id: travel.shortlist
    class: domain_component
    status: planned
    purpose: BOOKING_MODE live-comparison stage for selected options with current evidence and explanation
  - module_id: travel.itinerary
    class: domain_component
    status: planned
    purpose: round-trip, open-jaw, linear, rail-core, night-train, bus, ferry, road and package itinerary semantics
  - module_id: travel.access_and_route_policy
    class: domain_component
    status: planned
    purpose: door-to-door origin access, airport choice, surface transport, safe margins, useful-time and false-saving policy
  - module_id: travel.offer_intelligence
    class: domain_component
    status: planned
    purpose: travel-offer discovery, normalization, verification, dedupe, lifecycle and source-health semantics
  - module_id: travel.transport_coverage
    class: domain_component
    status: planned
    purpose: identify required provider capabilities and missing adapters for a candidate route
  - module_id: travel.adapter_demand_planner
    class: domain_component
    status: planned
    purpose: create provider adapters only when a real route requires them, then retain validated adapters for reuse
  - module_id: travel.journey_policy
    class: domain_component
    status: planned
    purpose: multimodal route quality, safe-margin, useful-time, separate-ticket and fallback policy
  - module_id: travel.live_journey_projection
    class: domain_component
    status: planned
    purpose: project shared live transport observations into trip-specific delay, cancellation and connection-risk state
  - module_id: travel.stay_intelligence
    class: domain_component
    status: planned
    purpose: accommodation comparison, full-price, cancellation, payment-timing, location and room-condition semantics
  - module_id: travel.package_intelligence
    class: domain_component
    status: planned
    purpose: package, organizer, transfer, baggage, board, deposit, cancellation and final-price semantics
  - module_id: travel.activity_intelligence
    class: domain_component
    status: planned
    purpose: event, attraction, food, nature, opening, closure and local-experience proposal semantics
  - module_id: travel.total_cost_policy
    class: domain_component
    status: planned
    purpose: full realistic cost, cost-per-day, cost-per-useful-day and false-bargain rejection policy
  - module_id: travel.scoring_explanation
    class: domain_component
    status: planned
    purpose: decomposed value, timing, fit, route, safety, document, urgency and confidence explanation
  - module_id: travel.data_registry_and_warehouse_policy
    class: domain_component
    status: planned
    purpose: travel-specific provider registry, observation families, retention, baselines, provenance and private warehouse rules
  - module_id: travel.price_history_policy
    class: domain_component
    status: planned
    purpose: travel-specific baselines, percentiles, anomaly and route-to-region fallback semantics
  - module_id: travel.document_gate
    class: domain_component
    status: planned
    purpose: document, entry, transit, carrier-acceptance and re-entry blocker semantics over shared eligibility evidence
  - module_id: travel.risk_projection
    class: domain_component
    status: planned
    purpose: travel impact of shared weather, disruption, conflict, disaster, health and infrastructure observations
  - module_id: travel.personalization_projection
    class: domain_component
    status: planned
    purpose: apply private history, confirmed preferences, temporary requests and inferred weights without exposing private values to public code or providers
  - module_id: travel.monitoring_and_alert_policy
    class: domain_component
    status: planned
    purpose: recheck active options, suppress noise, detect material changes and produce bounded proposals through shared scheduling and notification capabilities
  - module_id: travel.input_and_output_policy
    class: domain_component
    status: planned
    purpose: ask only for essential missing constraints and produce map, shortlist and booking-ready outputs with assumptions and evidence labels
  - module_id: travel.booking_record
    class: domain_component
    status: planned
    purpose: approved booking-reference and ticket-record semantics without payment authority
  - module_id: travel.review_proposal
    class: domain_component
    status: planned
    purpose: approve, reject, defer, recheck and expire proposal semantics
  - module_id: travel.trip_pack
    class: domain_component
    status: planned
    purpose: booking-ready route, timing, stay, rules, warnings, links, alternatives and Plan B manifest
  - module_id: travel.source_policy
    class: domain_component
    status: planned
    purpose: travel-specific evidence classes, source tiers, freshness and verification thresholds

shared_skeleton_dependencies:
