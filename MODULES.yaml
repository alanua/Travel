  - capability: task.workflow
  - capability: scheduler.loop
  - capability: notification.attention
  - capability: connector.acquisition
  - capability: parser.extract
  - capability: evidence.provenance
  - capability: artifact.private_store
  - capability: entity_resolution
  - capability: geo.route
  - capability: map.presentation
  - capability: tracker.read
  - capability: document.eligibility
  - capability: finance.currency
  - capability: finance.value
  - capability: weather.forecast
  - capability: event.calendar
  - capability: risk.situational_intelligence
  - capability: memory.gateway
  - capability: secret.reference
  - capability: observability.health
  - capability: approval.gate

adapter_families:
  transport:
    - national_rail
    - regional_transport_union
    - urban_transit
    - coach
    - ferry
    - airline
    - airport
    - gtfs
    - gtfs_realtime
    - siri
    - netex
    - gbfs
  travel_offers:
    - deal_publisher
    - tour_operator
    - package_retailer
    - ota
    - metasearch
    - direct_merchant
    - newsletter
    - manual_url_import
  stays:
    - accommodation_marketplace
    - direct_property
    - hotel_chain
  context:
    - climate
    - weather
    - event
    - safety_advisory
    - disaster
    - aviation_disruption
    - currency
    - destination_cost

hard_boundaries:
  public_repo:
    allows:
      - generic_code
      - contracts
      - public_provider_metadata
      - licences
      - synthetic_fixtures
      - public_safe_tests
    forbids:
      - personal_history
      - preferences
      - budgets
      - watchlists
      - rankings
      - route_candidates
      - private_price_history
      - raw_tracks
      - documents
      - bookings
      - tickets
      - payment_data
      - secret_values
  private_memory:
    authority: Skeleton MemoryGateway
  private_artifacts:
    authority: approved encrypted artifact store
  secrets:
    authority: provider-neutral Secret Store Gate
    storage: typed opaque references only

external_sensor_policy:
  worldmonitor:
    role: optional read_only situational_intelligence sensor
    authority: none
    requirements:
      - allowlisted_operations
      - provenance_validation
      - freshness_validation
      - stale_fallback_detection
      - simulation_detection
      - no_private_context_upstream
      - no_direct_memory_write
      - no_external_action_authority
