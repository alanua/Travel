<!doctype html><html lang="uk" data-build="milan-v11-responsive"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex"><meta name="referrer" content="no-referrer"><meta name="theme-color" content="#f7f8fa"><title>Мілан — план подорожі</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#f7f8fa;color:#202633;font:16px system-ui,sans-serif}main{width:min(88vw,420px);padding:28px;border:1px solid #e5e7eb;border-radius:18px;background:#fff}.bar{height:7px;margin-top:20px;border-radius:99px;background:#e5e7eb;overflow:hidden}.bar:after{content:"";display:block;width:42%;height:100%;background:#2869d8;animation:a 1s infinite alternate}@keyframes a{to{transform:translateX(138%)}}</style></head><body><main><strong>Відкриваю план Мілана…</strong><div class="bar"></div></main><script>(()=>{'use strict';const raw=location.hash.slice(1),variant=raw.slice(0,1),token=raw.slice(1),dates={'1':'2026-09-24','2':'2026-10-08','3':'2026-10-15'},parts=['p0.txt','p1.txt','p2.txt','p3.txt'],aad=new TextEncoder().encode('travel:milan-2026:m11'),nonce='vZU-RTDqFRzH41cx';const dec=s=>{s=s.replace(/\s/g,'').replace(/-/g,'+').replace(/_/g,'/');s+='='.repeat((4-s.length%4)%4);const r=atob(s);return Uint8Array.from(r,c=>c.charCodeAt(0))};(async()=>{try{if(!dates[variant]||token.length<10)throw 0;const keyBytes=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(token)),key=await crypto.subtle.importKey('raw',keyBytes,'AES-GCM',false,['decrypt']),encoded=(await Promise.all(parts.map(f=>fetch(f,{cache:'no-store',referrerPolicy:'no-referrer'}).then(r=>{if(!r.ok)throw 0;return r.text()})))).join(''),compressed=await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(nonce),additionalData:aad,tagLength:128},key,dec(encoded));let page=await new Response(new Blob([compressed]).stream().pipe </style>`;const fix=`<script>(()=>{const clean=()=>{document.querySelectorAll('span,p,small').forEach(el=>{const t=(el.textContent||'').trim();if(['Гортай ліворуч ↔ праворуч','Мапу можна гортати','Орієнтовний план'].includes(t))el.remove()});const map=document.querySelector('#route-map');if(map){const card=map.parentElement,scroller=card&&card.parentElement;if(scroller){scroller.style.maxWidth='100%';scroller.style.width='100%';scroller.style.overflowX='auto';scroller.style.webkitOverflowScrolling='touch';scroller.style.touchAction='pan-x'}if(innerWidth<768&&card){card.style.width='660px';card.style.minWidth='660px';card.style.maxWidth='none'}}document.querySelectorAll('main,main>*,section,article').forEach(el=>{el.style.minWidth='0';el.style.maxWidth='100%'});};addEventListener('DOMContentLoaded',clean,{once:true});addEventListener('resize',clean)})()<\/script>`;page=page.replace('</head>',css+'</head>').replace('</body>',fix+'</body>');history.replaceState(null,'','#date='+dates[variant]);document.open();document.write(page);document.close()}catch(e){document.body.innerHTML='<main><strong>Посилання недійсне.</strong></main>'}})()})();</script></body></html>
