<!doctype html><html lang="uk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="robots" content="noindex,nofollow,noarchive"><title>Мілан</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font:16px system-ui;background:#fff;color:#1f2937}main{width:min(88vw,420px);padding:28px;border:1px solid #e5e7eb;border-radius:16px}.bar{height:7px;margin-top:20px;border-radius:99px;background:#e5e7eb;overflow:hidden}.bar:after{content:"";display:block;width:42%;height:100%;background:#2563eb;animation:a 1s infinite alternate}@keyframes a{to{transform:translateX(138%)}}</style></head><body><main><strong>Відкриваю новий план Мілана…</strong><div class="bar"></div></main><script>(()=>{'use strict';const raw=location.hash.slice(1),variant=raw.slice(0,1),token=raw.slice(1),dates={'1':'2026-09-24','2':'2026-10-08','3':'2026-10-15'},mask='VuwDWcBvkVg-OieoxmSL_ZmYcqGT_ZyRF8fhsWUj988',nonce='7eAQPNXWPC6Gr62v',aad=new TextEncoder().encode('travel:milan-2026:tailwind-journey-v6');const dec=s=>{s=s.replace(/-/g,'+').replace(/_/g,'/');s+='='.repeat((4-s.length%4)%4);const r=atob(s);return Uint8Array.from(r,c=>c.charCodeAt(0))};(async()=>{try{if(!dates[variant]||token.length<10)throw 0;const digest=new Uint8Array(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(token))),m=dec(mask),kb=digest.map((v,i)=>v^m[i]),key=await crypto.subtle.importKey('raw',kb,'AES-GCM',false,['decrypt']);const encoded=await fetch('milan-2026/payload-milan-v6.txt',{cache:'no-store'}).then(r=>{if(!r.ok)throw 0;return r.text()});const compressed=await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(nonce),additionalData:aad,tagLength:128},key,dec(encoded));const page=await new Response(new Blob([compressed]).stream().pipeThrough(new DecompressionStream('gzip'))).text();history.replaceState(null,'','#date='+dates[variant]);document.open();document.write(page);document.close()}catch(e){document.body.innerHTML='<main><strong>Посилання недійсне.</strong></main>'}})()})();</script></body></html>
