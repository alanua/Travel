name: Publish encrypted Travel pages

on:
  push:
    branches: [main]
    paths:
      - 'milan-2026/**'
      - '.github/workflows/publish-encrypted-travel-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: travel-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Build bounded encrypted site artifact
        id: build
        shell: bash
        run: |
          set -euo pipefail
          test -f milan-2026/index.html
          test -f milan-2026/payload-08.txt
          rm -rf _site
          mkdir -p _site/milan-2026
          cp milan-2026/index.html milan-2026/payload-*.txt _site/milan-2026/
          touch _site/.nojekyll
          find _site -type f -exec chmod 0644 {} +
          test "$(find _site/milan-2026 -maxdepth 1 -type f | wc -l)" -eq 11
          ! grep -R -E 'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|#k=[A-Za-z0-9_-]+' _site
      - name: Configure and enable Pages
        id: configure
        continue-on-error: true
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload encrypted site artifact
        id: upload
        if: steps.configure.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        if: steps.configure.outcome == 'success' && steps.upload.outcome == 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Publish public-safe deployment receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          CONFIGURE_OUTCOME: ${{ steps.configure.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        shell: bash
        run: |
          set -euo pipefail
          body=$(cat <<EOF
          Encrypted Milan Pages deployment receipt

          - configure: ${CONFIGURE_OUTCOME:-not_run}
          - upload: ${UPLOAD_OUTCOME:-not_run}
          - deploy: ${DEPLOY_OUTCOME:-not_run}
          - page_url: ${PAGE_URL:-not_available}
          - plaintext_itinerary_published: false
          - fragment_key_published: false
          EOF
          )
          gh issue comment 14 --repo alanua/Travel --body "$body"
          test "${DEPLOY_OUTCOME:-}" = "success"

  verify-live:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Verify published loader over HTTPS
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          url='https://alanua.github.io/Travel/milan-2026/'
          ok=false
          code=000
          for attempt in $(seq 1 30); do
            code=$(curl -L -sS -o /tmp/milan-loader.html -w '%{http_code}' --connect-timeout 10 --max-time 20 "$url" || true)
            if [ "$code" = 200 ] && grep -q 'Приватна сторінка подорожі' /tmp/milan-loader.html && grep -q 'payload-08.txt' /tmp/milan-loader.html; then
              ok=true
              break
            fi
            sleep 10
          done
          echo "http_code=$code" >> "$GITHUB_OUTPUT"
          echo "verified=$ok" >> "$GITHUB_OUTPUT"
          test "$ok" = true
      - name: Publish live verification receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          HTTP_CODE: ${{ steps.verify.outputs.http_code }}
          VERIFIED: ${{ steps.verify.outputs.verified }}
        shell: bash
        run: |
          set -euo pipefail
          body=$(cat <<EOF
          Encrypted Milan Pages live verification

          - url: https://alanua.github.io/Travel/milan-2026/
          - http_code: ${HTTP_CODE:-unknown}
          - loader_verified: ${VERIFIED:-false}
          - plaintext_itinerary_published: false
          - fragment_key_published: false
          EOF
          )
          gh issue comment 14 --repo alanua/Travel --body "$body"
          test "${VERIFIED:-false}" = true
