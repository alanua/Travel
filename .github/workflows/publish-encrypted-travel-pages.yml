name: Publish encrypted Travel pages

on:
  push:
    branches: [main]
    paths:
      - 'milan-2026/**'
      - '.github/workflows/publish-encrypted-travel-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: travel-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment:
      name: github-pages
      url: https://alanua.github.io/Travel/milan-2026/
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_PAGES: 'true'
    steps:
      - name: Build, upload and deploy encrypted Milan page
        shell: bash
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          work="$RUNNER_TEMP/travel-main"
          site="$RUNNER_TEMP/site"
          artifact="$RUNNER_TEMP/artifact.tar"

          git clone --depth=1 --branch main "https://x-access-token:${GH_TOKEN}@github.com/${repo}.git" "$work"
          cd "$work"

          test -f milan-2026/index.html
          test -f milan-2026/payload-08.txt
          test -f milan-2026/enhance.css
          test -f milan-2026/enhance.js
          test "$(find milan-2026 -maxdepth 1 -type f | wc -l)" -eq 13
          ! grep -R -E 'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|#k=[A-Za-z0-9_-]+' milan-2026

          expected=$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path('milan-2026/index.html').read_text(encoding='utf-8')
          match = re.search(r'data-skeleton-page-revision="([a-f0-9]{64})"', text)
          if not match:
              raise SystemExit('missing_revision_marker')
          print(match.group(1))
          PY
          )

          rm -rf "$site"
          mkdir -p "$site/milan-2026"
          cp milan-2026/index.html milan-2026/payload-*.txt milan-2026/enhance.css milan-2026/enhance.js "$site/milan-2026/"
          touch "$site/.nojekyll"
          tar --dereference --hard-dereference --directory "$site" -cvf "$artifact" --exclude=.git --exclude=.github .

          git clone --depth=1 --branch v4 https://github.com/actions/upload-artifact.git "$RUNNER_TEMP/upload-artifact"
          git clone --depth=1 --branch v4 https://github.com/actions/deploy-pages.git "$RUNNER_TEMP/deploy-pages"

          env \
            "INPUT_NAME=github-pages" \
            "INPUT_PATH=$artifact" \
            "INPUT_IF-NO-FILES-FOUND=error" \
            "INPUT_RETENTION-DAYS=1" \
            "INPUT_COMPRESSION-LEVEL=6" \
            "INPUT_OVERWRITE=false" \
            "INPUT_INCLUDE-HIDDEN-FILES=false" \
            node "$RUNNER_TEMP/upload-artifact/dist/upload/index.js"

          env \
            "INPUT_TOKEN=$GH_TOKEN" \
            "INPUT_TIMEOUT=600000" \
            "INPUT_ERROR_COUNT=10" \
            "INPUT_REPORTING_INTERVAL=5000" \
            "INPUT_ARTIFACT_NAME=github-pages" \
            "INPUT_PREVIEW=false" \
            node "$RUNNER_TEMP/deploy-pages/dist/index.js"

          url='https://alanua.github.io/Travel/milan-2026/'
          verified=false
          http_code=000
          css_code=000
          js_code=000
          for attempt in $(seq 1 30); do
            http_code=$(curl -L -sS -o /tmp/milan-loader.html -w '%{http_code}' --connect-timeout 10 --max-time 20 "$url" || true)
            css_code=$(curl -L -sS -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 20 "${url}enhance.css?v=${expected:0:12}" || true)
            js_code=$(curl -L -sS -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 20 "${url}enhance.js?v=${expected:0:12}" || true)
            if [ "$http_code" = 200 ] &&
               grep -q "data-skeleton-page-revision=\"$expected\"" /tmp/milan-loader.html &&
               grep -q 'payload-08.txt' /tmp/milan-loader.html &&
               [ "$css_code" = 200 ] &&
               [ "$js_code" = 200 ]; then
              verified=true
              break
            fi
            sleep 5
          done
          test "$verified" = true

          body=$(cat <<EOF
          Encrypted Milan Pages exact live verification

          - http_code: $http_code
          - enhance_css_code: $css_code
          - enhance_js_code: $js_code
          - expected_revision: $expected
          - exact_revision_verified: true
          - artifact_deployment: success
          - plaintext_itinerary_published: false
          - fragment_key_published: false
          EOF
          )
          gh issue comment 14 --repo "$repo" --body "$body"
