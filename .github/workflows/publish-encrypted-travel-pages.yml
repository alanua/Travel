name: Publish encrypted Travel page

on:
  push:
    branches: [main]
    paths:
      - 'milan-2026/**'
      - '.github/workflows/publish-encrypted-travel-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: travel-page-publication
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Verify immutable Milan HTML publication
        shell: bash
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          work="$RUNNER_TEMP/travel-main"
          git clone --depth=1 --branch main "https://x-access-token:${GH_TOKEN}@github.com/${repo}.git" "$work"
          cd "$work"

          expected=$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path('milan-2026/index.html').read_text(encoding='utf-8')
          match = re.search(r'data-skeleton-page-revision="([a-f0-9]{64})"', text)
          if not match:
              raise SystemExit('missing_revision_marker')
          print(match.group(1))
          PY
          )

          base="https://cdn.githubraw.com/alanua/Travel/${GITHUB_SHA}/milan-2026"
          loader_code=$(curl -L -sS -o /tmp/milan-loader.html -w '%{http_code}' --connect-timeout 10 --max-time 30 "${base}/index.html")
          css_code=$(curl -L -sS -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 30 "${base}/enhance.css")
          js_code=$(curl -L -sS -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 30 "${base}/enhance.js")
          payload_code=$(curl -L -sS -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 30 "${base}/payload-08.txt")

          test "$loader_code" = 200
          test "$css_code" = 200
          test "$js_code" = 200
          test "$payload_code" = 200
          grep -q "data-skeleton-page-revision=\"$expected\"" /tmp/milan-loader.html
          grep -q 'payload-08.txt' /tmp/milan-loader.html

          body=$(cat <<EOF
          Milan Travel page published

          - publication: immutable_html_cdn
          - source_commit: $GITHUB_SHA
          - http_code: $loader_code
          - enhance_css_code: $css_code
          - enhance_js_code: $js_code
          - payload_code: $payload_code
          - expected_revision: $expected
          - exact_revision_verified: true
          - plaintext_itinerary_published: false
          - fragment_key_published: false
          EOF
          )
          gh issue comment 14 --repo "$repo" --body "$body"
