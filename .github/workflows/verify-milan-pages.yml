name: Verify encrypted Milan page live

on:
  pull_request:
    paths:
      - '.github/workflows/verify-milan-pages.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify executable immutable page and ciphertext integrity
        run: |
          base='https://rawcdn.githack.com/alanua/Travel/5a0957d6aef67713d766e2d91fd4fe628916312e/milan-2026'
          headers="$(mktemp)"
          body="$(mktemp)"
          status="$(curl --silent --show-error --location --output "$body" --dump-header "$headers" --write-out '%{http_code}' "$base/index.html")"
          content_type="$(awk 'BEGIN{IGNORECASE=1} /^content-type:/{value=$0} END{sub(/^[^:]+:[[:space:]]*/,"",value); gsub(/\r/,"",value); print value}' "$headers")"
          test "$status" = '200'
          printf '%s' "$content_type" | grep --ignore-case --quiet 'text/html'
          grep --quiet 'Приватна сторінка подорожі' "$body"
          grep --quiet 'payload-08.txt' "$body"

          combined="$(mktemp)"
          for number in $(seq 0 8); do
            part="$(printf '%02d' "$number")"
            curl --fail --silent --show-error --location "$base/payload-${part}.txt" >> "$combined"
          done
          tr -d '[:space:]' < "$combined" > "$combined.compact"
          text_sha="$(sha256sum "$combined.compact" | awk '{print $1}')"
          test "$text_sha" = '2ea639370730aac2e9be8f574f85c837a31cbf53606affcbd922baa6539d4214'

          echo 'status=DONE'
          echo 'http_status=200'
          echo 'content_type_html=true'
          echo 'shell_verified=true'
          echo 'all_payload_files_verified=true'
          echo 'ciphertext_integrity_verified=true'
