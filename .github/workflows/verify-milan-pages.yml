name: Verify encrypted Milan page live

on:
  pull_request:
    paths:
      - '.github/workflows/verify-milan-pages.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Select executable immutable CDN
        run: |
          set +e
          candidates=(
            'https://rawcdn.githack.com/alanua/Travel/5a0957d6aef67713d766e2d91fd4fe628916312e/milan-2026/index.html'
            'https://cdn.statically.io/gh/alanua/Travel/5a0957d6aef67713d766e2d91fd4fe628916312e/milan-2026/index.html'
          )
          for page in "${candidates[@]}"; do
            headers="$(mktemp)"
            body="$(mktemp)"
            status="$(curl --silent --show-error --location --output "$body" --dump-header "$headers" --write-out '%{http_code}' "$page")"
            content_type="$(awk 'BEGIN{IGNORECASE=1} /^content-type:/{value=$0} END{sub(/^[^:]+:[[:space:]]*/,"",value); gsub(/\r/,"",value); print value}' "$headers")"
            title_marker=false
            payload_marker=false
            grep --quiet 'Приватна сторінка подорожі' "$body" && title_marker=true
            grep --quiet 'payload-08.txt' "$body" && payload_marker=true
            echo "candidate=$page"
            echo "http_status=$status"
            echo "content_type=${content_type:-missing}"
            echo "title_marker=$title_marker"
            echo "payload_marker=$payload_marker"
            if test "$status" = '200' && printf '%s' "$content_type" | grep --ignore-case --quiet 'text/html' && test "$title_marker" = 'true' && test "$payload_marker" = 'true'; then
              echo 'status=DONE'
              exit 0
            fi
          done
          echo 'status=BLOCKED'
          exit 1
