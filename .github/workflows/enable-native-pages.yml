name: Enable native encrypted Travel Pages

on:
  pull_request:
    paths:
      - '.github/workflows/enable-native-pages.yml'

permissions:
  contents: read
  pages: write

jobs:
  enable-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Enable Pages from gh-pages when absent
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          api='https://api.github.com/repos/alanua/Travel/pages'
          status=$(curl -sS -o /tmp/pages.json -w '%{http_code}' \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$api")
          if [ "$status" = 404 ]; then
            status=$(curl -sS -o /tmp/pages-create.json -w '%{http_code}' \
              -X POST \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "$api" \
              -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}')
            echo "pages_create_http=$status"
            test "$status" = 201 || test "$status" = 409
          else
            echo "pages_status_http=$status"
            test "$status" = 200
          fi

      - name: Verify native page
        shell: bash
        run: |
          set -euo pipefail
          url='https://alanua.github.io/Travel/milan-2026/'
          ok=false
          for attempt in $(seq 1 30); do
            code=$(curl -L -sS -o /tmp/page.html -w '%{http_code}' --connect-timeout 5 --max-time 15 "$url" || true)
            if [ "$code" = 200 ] && grep -Fq 'Приватна сторінка подорожі' /tmp/page.html; then
              ok=true
              break
            fi
            sleep 10
          done
          echo "native_pages_http_ok=$ok"
          test "$ok" = true
