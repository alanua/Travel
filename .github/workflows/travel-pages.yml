name: Deploy encrypted Travel pages

on:
  push:
    branches: [main]
    paths:
      - 'milan-2026/**'
      - '.github/workflows/travel-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: travel-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Prepare encrypted site
        run: |
          mkdir -p _site/milan-2026
          cp -R milan-2026/. _site/milan-2026/
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
