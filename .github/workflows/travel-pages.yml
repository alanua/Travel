name: Deploy encrypted Travel pages

on:
  push:
    branches: [main]
    paths:
      - 'milan-2026/**'
      - '.github/workflows/travel-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: travel-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Prepare encrypted site
        run: |
          mkdir -p _site/milan-2026
          cp -R milan-2026/. _site/milan-2026/
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify published shell
        env:
          PAGE_ROOT: ${{ steps.deployment.outputs.page_url }}
        run: |
          page="${PAGE_ROOT%/}/milan-2026/"
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error --location "$page" | grep --quiet 'Приватна сторінка подорожі'; then
              echo "PAGE_URL=$page" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 3
          done
          exit 1
      - name: Publish deployment receipt
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Travel Pages deployment receipt ${GITHUB_RUN_ID}" \
            --body "status=DONE
          page_url=${PAGE_URL}
          commit=${GITHUB_SHA}
          shell_verified=true"
